<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KOBE Collection Game</title>
    <style>
        body { margin: 0; padding: 0; text-align: center; background-color: #e0f7fa; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
        canvas { background-color: #fff; border-bottom: 4px solid #004d40; display: block; }
        
        /* スタート・リトライ画面のオーバーレイ */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10;
        }
        button {
            padding: 15px 30px; font-size: 1.2em; font-weight: bold;
            background-color: #ff9800; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px #e65100;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #e65100; }
        h1 { margin-bottom: 10px; }
        .score-display { font-size: 2em; color: #ffeb3b; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="title">⚓ 神戸名産キャッチ 🍰</h1>
        <p id="message" style="margin-bottom: 20px;">アイテムを逃さず集めよう！</p>
        <div id="finalScore" class="score-display" style="display:none;"></div>
        <button id="startBtn">ゲーム開始！</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const startBtn = document.getElementById("startBtn");
        const message = document.getElementById("message");
        const finalScore = document.getElementById("finalScore");
        const title = document.getElementById("title");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameState = "start"; // "start", "playing", "gameOver"
        let items = [];
        const basket = { x: canvas.width / 2 - 40, y: canvas.height - 80, width: 80, height: 20, color: "#8d6e63" };

        const kobeItems = [
            { char: "🥩", points: 10 },
            { char: "🍰", points: 5 },
            { char: "🥟", points: 5 },
            { char: "⚓", points: 2 }
        ];

        // ゲーム開始・リセット処理
        function startGame() {
            score = 0;
            items = [];
            gameState = "playing";
            overlay.style.display = "none";
            gameLoop();
        }

        startBtn.addEventListener("click", startGame);

        // タッチ/マウス操作
        const moveBasket = (clientX) => {
            if (gameState !== "playing") return;
            const rect = canvas.getBoundingClientRect();
            basket.x = clientX - rect.left - basket.width / 2;
            if (basket.x < 0) basket.x = 0;
            if (basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
        };

        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            moveBasket(e.touches[0].clientX);
        }, { passive: false });

        canvas.addEventListener("mousemove", (e) => moveBasket(e.clientX));

        function createItem() {
            const type = kobeItems[Math.floor(Math.random() * kobeItems.length)];
            items.push({
                x: Math.random() * (canvas.width - 30),
                y: -30,
                speed: 4 + Math.random() * 3,
                ...type
            });
        }

        function update() {
            if (gameState !== "playing") return;

            if (Math.random() < 0.03) createItem();

            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += items[i].speed;

                // キャッチ判定
                if (items[i].y + 20 > basket.y && 
                    items[i].x > basket.x - 20 && 
                    items[i].x < basket.x + basket.width) {
                    score += items[i].points;
                    items.splice(i, 1);
                    continue;
                }

                // 「ミスったら死ぬ」判定（画面の下に落ちたら終了）
                if (items[i].y > canvas.height) {
                    endGame();
                }
            }
        }

        function endGame() {
            gameState = "gameOver";
            overlay.style.display = "flex";
            title.innerText = "GAME OVER";
            message.innerText = "アイテムを落としてしまった！";
            finalScore.innerText = "SCORE: " + score;
            finalScore.style.display = "block";
            startBtn.innerText = "もう一度挑戦！";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // カゴ
            ctx.fillStyle = basket.color;
            ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

            // アイテム
            ctx.font = "35px Arial";
            items.forEach(item => {
                ctx.fillText(item.char, item.x, item.y);
            });

            // プレイ中のスコア表示
            ctx.fillStyle = "#004d40";
            ctx.font = "bold 20px Arial";
            ctx.fillText("スコア: " + score, 20, 40);
        }

        function gameLoop() {
            if (gameState !== "playing") return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
